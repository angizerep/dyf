<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Galerías — Imágenes de entregables</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #0b0f17;
      color: #e5e7eb;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: rgba(255, 255, 255, .04);
      color: #e5e7eb;
      font-weight: 700;
    }

    .muted {
      color: #9ca3af;
    }

    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid #1f2937;
      border-radius: 16px;
      background: rgba(255, 255, 255, .03);
      overflow: hidden;
    }

    .card:hover {
      border-color: rgba(56, 189, 248, .35);
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: rgba(0, 0, 0, .15);
    }

    .body {
      padding: 12px;
    }

    .body b {
      display: block;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">Galerías de imágenes</h1>
        <div class="muted">Acceso visual a las imágenes extraídas de cada actividad.</div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="btn" href="index.html">← Volver al portal</a>
      </div>
    </div>

    <div class="grid">

      <a class="card" href="galeria_Actividad_3.html">
        <img src="assets/images/source/Actividad_3/image10.png" alt="Actividad_3" loading="lazy" />
        <div class="body">
          <b>Actividad_3</b>
          <div class="muted">31 imágenes</div>
        </div>
      </a>

      <a class="card" href="galeria_Actividad_4.html">
        <img src="assets/images/source/Actividad_4/image1.jpg" alt="Actividad_4" loading="lazy" />
        <div class="body">
          <b>Actividad_4</b>
          <div class="muted">7 imágenes</div>
        </div>
      </a>

      <a class="card" href="galeria_Actividad_5.html">
        <img src="assets/images/source/Actividad_5/image1.png" alt="Actividad_5" loading="lazy" />
        <div class="body">
          <b>Actividad_5</b>
          <div class="muted">3 imágenes</div>
        </div>
      </a>

      <a class="card" href="galeria_Actividad_6.html">
        <img src="assets/images/source/Actividad_6/image1.png" alt="Actividad_6" loading="lazy" />
        <div class="body">
          <b>Actividad_6</b>
          <div class="muted">3 imágenes</div>
        </div>
      </a>

      <a class="card" href="galeria_Actividad_7.html">
        <img src="assets/images/source/Actividad_7/image1.png" alt="Actividad_7" loading="lazy" />
        <div class="body">
          <b>Actividad_7</b>
          <div class="muted">2 imágenes</div>
        </div>
      </a>

    </div>
  </div>
</body>

</html>
