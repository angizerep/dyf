<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Galería Actividad_4</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #0b0f17;
      color: #e5e7eb;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: rgba(255, 255, 255, .04);
      color: #e5e7eb;
      font-weight: 700;
    }

    .muted {
      color: #9ca3af;
    }

    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .item {
      border: 1px solid #1f2937;
      border-radius: 16px;
      background: rgba(255, 255, 255, .03);
      overflow: hidden;
    }

    .item:hover {
      border-color: rgba(56, 189, 248, .35);
    }

    img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: rgba(0, 0, 0, .15);
    }

    .cap {
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">Galería Actividad_4</h1>
        <div class="muted">Imágenes extraídas del documento fuente (7 archivos).</div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="btn" href="index.html">← Volver al portal</a>
        <a class="btn" href="assets/deliverables/Actividad_4.pdf" target="_blank" rel="noopener">Abrir PDF</a>
      </div>
    </div>

    <div class="grid">

      <a class="item" href="assets/images/source/Actividad_4/image1.jpg" target="_blank" rel="noopener">
        <img src="assets/images/source/Actividad_4/image1.jpg" alt="Actividad_4 - image1.jpg" loading="lazy" />
        <div class="cap">image1.jpg</div>
      </a>

      <a class="item" href="assets/images/source/Actividad_4/image2.png" target="_blank" rel="noopener">
        <img src="assets/images/source/Actividad_4/image2.png" alt="Actividad_4 - image2.png" loading="lazy" />
        <div class="cap">image2.png</div>
      </a>

      <a class="item" href="assets/images/source/Actividad_4/image3.png" target="_blank" rel="noopener">
        <img src="assets/images/source/Actividad_4/image3.png" alt="Actividad_4 - image3.png" loading="lazy" />
        <div class="cap">image3.png</div>
      </a>

      <a class="item" href="assets/images/source/Actividad_4/image4.png" target="_blank" rel="noopener">
        <img src="assets/images/source/Actividad_4/image4.png" alt="Actividad_4 - image4.png" loading="lazy" />
        <div class="cap">image4.png</div>
      </a>

      <a class="item" href="assets/images/source/Actividad_4/image5.png" target="_blank" rel="noopener">
        <img src="assets/images/source/Actividad_4/image5.png" alt="Actividad_4 - image5.png" loading="lazy" />
        <div class="cap">image5.png</div>
      </a>

      <a class="item" href="assets/images/source/Actividad_4/image6.png" target="_blank" rel="noopener">
        <img src="assets/images/source/Actividad_4/image6.png" alt="Actividad_4 - image6.png" loading="lazy" />
        <div class="cap">image6.png</div>
      </a>

      <a class="item" href="assets/images/source/Actividad_4/image7.png" target="_blank" rel="noopener">
        <img src="assets/images/source/Actividad_4/image7.png" alt="Actividad_4 - image7.png" loading="lazy" />
        <div class="cap">image7.png</div>
      </a>

    </div>
  </div>
</body>

</html>
